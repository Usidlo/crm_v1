<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sales PD{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f5f7fa; }
    .sidebar {
      min-height: 100vh;
      background: #1a2236;
      color: #cdd6f4;
      width: 220px;
      flex-shrink: 0;
    }
    .sidebar .brand {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      padding: 1.5rem 1.25rem 1rem;
      letter-spacing: .04em;
    }
    .sidebar .nav-link {
      color: #9ba8c5;
      border-radius: 8px;
      margin: 2px 10px;
      padding: .55rem .9rem;
      font-size: .95rem;
    }
    .sidebar .nav-link:hover, .sidebar .nav-link.active {
      background: #2d3a57;
      color: #fff;
    }
    .sidebar .nav-link i { margin-right: 8px; }
    .main-content { flex: 1; min-width: 0; padding: 2rem; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); border-radius: 12px; }
    .badge-method {
      font-size: .78rem;
      padding: .3em .65em;
      border-radius: 20px;
    }
    .table th { font-weight: 600; font-size: .85rem; text-transform: uppercase; letter-spacing: .04em; color: #6c757d; }
  </style>
</head>
<body>
<div class="d-flex">
  <nav class="sidebar d-flex flex-column py-2">
    <div class="brand">
      <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Sales PD"
           style="height:36px; object-fit:contain; margin-right:8px; vertical-align:middle;">
      Sales PD
    </div>
    <hr class="border-secondary mx-3 my-2">
    <ul class="nav flex-column px-1">
      <li class="nav-item">
        <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}"
           href="{{ url_for('dashboard') }}">
          <i class="bi bi-speedometer2"></i>Přehled
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if 'client' in (request.endpoint or '') %}active{% endif %}"
           href="{{ url_for('clients') }}">
          <i class="bi bi-people"></i>Klienti
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if 'member' in (request.endpoint or '') or request.endpoint == 'team' %}active{% endif %}"
           href="{{ url_for('team') }}">
          <i class="bi bi-person-badge"></i>Tým
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if 'reminder' in (request.endpoint or '') %}active{% endif %}"
           href="{{ url_for('all_reminders') }}">
          <i class="bi bi-bell"></i>Remindry
        </a>
      </li>
    </ul>
    <div class="mt-auto px-3 pb-3 d-flex flex-column gap-2">
      <a href="{{ url_for('export_contacts') }}" class="btn btn-outline-success btn-sm w-100">
        <i class="bi bi-download me-1"></i>Export kontaktů
      </a>
      <a href="{{ url_for('logout') }}" class="btn btn-outline-secondary btn-sm w-100">
        <i class="bi bi-box-arrow-right"></i> Odhlásit
      </a>
    </div>
  </nav>

  <div class="main-content">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
