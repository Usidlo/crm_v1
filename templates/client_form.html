{% extends 'base.html' %}
{% block title %}{% if client %}Upravit{% else %}Nový{% endif %} klient – CRM Sales PD{% endblock %}
{% block content %}

<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('clients') }}" class="btn btn-sm btn-outline-secondary me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h2 class="fw-bold mb-0">
    {% if client %}Upravit klienta{% else %}Nový klient{% endif %}
  </h2>
</div>

<div class="card" style="max-width:600px">
  <div class="card-body p-4">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Název firmy <span class="text-danger">*</span></label>
        <input type="text" name="company" class="form-control"
               value="{{ client.company if client else '' }}" required autofocus>
      </div>
      <div class="row g-3 mb-3">
        <div class="col">
          <label class="form-label fw-semibold">IČO</label>
          <input type="text" name="ico" class="form-control" maxlength="20"
                 value="{{ client.ico if client and client.ico else '' }}">
        </div>
        <div class="col">
          <label class="form-label fw-semibold">Telefon</label>
          <input type="text" name="phone" class="form-control"
                 value="{{ client.phone if client else '' }}">
        </div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col">
          <label class="form-label fw-semibold">E-mail</label>
          <input type="email" name="email" class="form-control"
                 value="{{ client.email if client else '' }}">
        </div>
        <div class="col">
          <label class="form-label fw-semibold">Web</label>
          <input type="text" name="website" class="form-control" placeholder="https://..."
                 value="{{ client.website if client and client.website else '' }}">
        </div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col">
          <label class="form-label fw-semibold">Velikost firmy</label>
          <select name="size_category" class="form-select">
            <option value="">— neznámá —</option>
            {% for key, label in size_labels.items() %}
            <option value="{{ key }}" {% if client and client.size_category == key %}selected{% endif %}>
              {{ label }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col">
          <label class="form-label fw-semibold">Kvalita velikosti</label>
          <select name="size_quality" class="form-select">
            <option value="">— neznámá —</option>
            {% for key, label in size_quality_labels.items() %}
            <option value="{{ key }}" {% if client and client.size_quality == key %}selected{% endif %}>
              {{ label }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col">
          <label class="form-label fw-semibold">Kategorie</label>
          <select name="temperature" class="form-select">
            <option value="">— bez kategorie —</option>
            {% for key, label in temp_labels.items() %}
            <option value="{{ key }}" {% if client and client.temperature == key %}selected{% endif %}>
              {{ label }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col">
          <label class="form-label fw-semibold">Pipeline</label>
          <select name="pipeline_status" class="form-select">
            <option value="">— bez statusu —</option>
            {% for key, label in pipeline_labels.items() %}
            <option value="{{ key }}" {% if client and client.pipeline_status == key %}selected{% endif %}>
              {{ label }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Vlastník</label>
        <select name="owner_id" class="form-select">
          <option value="">— bez vlastníka —</option>
          {% for m in members %}
          <option value="{{ m.id }}" {% if client and client.owner_id == m.id %}selected{% endif %}>
            {{ m.name }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Poznámky</label>
        <textarea name="notes" class="form-control" rows="3">{{ client.notes if client else '' }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>Uložit
        </button>
        <a href="{{ url_for('clients') }}" class="btn btn-outline-secondary">Zrušit</a>
        {% if client %}
        <button type="button" class="btn btn-outline-danger btn-sm ms-auto"
                onclick="if(confirm('Opravdu smazat klienta včetně všech kontaktů?')) document.getElementById('deleteClientForm').submit()">
          <i class="bi bi-trash me-1"></i>Smazat
        </button>
        {% endif %}
      </div>
    </form>
    {% if client %}
    <form id="deleteClientForm" method="post"
          action="{{ url_for('delete_client', id=client.id) }}" class="d-none"></form>
    {% endif %}
  </div>
</div>
{% endblock %}
