{% extends 'base.html' %}
{% block title %}{% if member %}Upravit{% else %}Přidat{% endif %} člena – CRM Sales PD{% endblock %}
{% block content %}

<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('team') }}" class="btn btn-sm btn-outline-secondary me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h2 class="fw-bold mb-0">
    {% if member %}Upravit člena{% else %}Přidat člena týmu{% endif %}
  </h2>
</div>

<div class="card" style="max-width:480px">
  <div class="card-body p-4">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Jméno <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control"
               value="{{ member.name if member else '' }}" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">E-mail</label>
        <input type="email" name="email" class="form-control"
               value="{{ member.email if member else '' }}">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>Uložit
        </button>
        <a href="{{ url_for('team') }}" class="btn btn-outline-secondary">Zrušit</a>
        {% if member %}
        <form method="post" action="{{ url_for('delete_member', id=member.id) }}"
              class="ms-auto"
              onsubmit="return confirm('Smazat tohoto člena?')">
          <button type="submit" class="btn btn-outline-danger btn-sm">
            <i class="bi bi-trash me-1"></i>Smazat
          </button>
        </form>
        {% endif %}
      </div>
    </form>
  </div>
</div>
{% endblock %}
