<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Přihlášení – CRM PROLUS Dynamics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f7fa; }
  </style>
</head>
<body>
<div class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="card p-4" style="width:100%;max-width:380px;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.1);">
    <h4 class="mb-4 text-center fw-bold">CRM PROLUS Dynamics</h4>
    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Uživatelské jméno</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-3">
        <label class="form-label">Heslo</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Přihlásit se</button>
    </form>
  </div>
</div>
</body>
</html>
